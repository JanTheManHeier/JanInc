<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanInc</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='4' y='26' font-size='28' font-family='monospace' fill='%2300e5ff'>J</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace, sans-serif;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .logo-container {
            position: relative;
            z-index: 1;
            text-align: center;
            user-select: none;
        }

        .logo {
            font-family: 'Orbitron', monospace, sans-serif;
            font-weight: 900;
            font-size: clamp(3rem, 10vw, 8rem);
            letter-spacing: 0.15em;
            color: #fff;
            text-shadow:
                0 0 10px rgba(0, 229, 255, 0.8),
                0 0 20px rgba(0, 229, 255, 0.6),
                0 0 40px rgba(0, 229, 255, 0.4),
                0 0 80px rgba(0, 229, 255, 0.2);
            animation: breathe 4s ease-in-out infinite, fadeIn 2s ease-out;
            cursor: default;
        }

        .logo span.accent {
            color: #00e5ff;
        }

        .dot {
            display: inline-block;
            width: 0.15em;
            height: 0.15em;
            background: #00e5ff;
            border-radius: 50%;
            vertical-align: middle;
            margin-left: 0.05em;
            box-shadow:
                0 0 6px #00e5ff,
                0 0 15px #00e5ff,
                0 0 30px rgba(0, 229, 255, 0.5);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% {
                text-shadow:
                    0 0 10px rgba(0, 229, 255, 0.8),
                    0 0 20px rgba(0, 229, 255, 0.6),
                    0 0 40px rgba(0, 229, 255, 0.4),
                    0 0 80px rgba(0, 229, 255, 0.2);
            }
            50% {
                text-shadow:
                    0 0 15px rgba(0, 229, 255, 1),
                    0 0 30px rgba(0, 229, 255, 0.8),
                    0 0 60px rgba(0, 229, 255, 0.5),
                    0 0 120px rgba(0, 229, 255, 0.3);
            }
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.3); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <canvas id="network"></canvas>
    <div class="logo-container">
        <div class="logo">
            <span class="accent">J</span>AN<span class="accent">I</span>NC<span class="dot"></span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('network');
        const ctx = canvas.getContext('2d');
        let width, height, particles, mouse;

        const CONFIG = {
            particleCount: 120,
            connectionDistance: 150,
            mouseRadius: 200,
            particleSpeed: 0.3,
            lineOpacity: 0.15,
            particleSize: 1.5,
            color: { r: 0, g: 229, b: 255 }
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function createParticle() {
            return {
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * CONFIG.particleSpeed,
                vy: (Math.random() - 0.5) * CONFIG.particleSpeed,
                size: Math.random() * CONFIG.particleSize + 0.5,
                opacity: Math.random() * 0.5 + 0.3
            };
        }

        function init() {
            resize();
            particles = Array.from({ length: CONFIG.particleCount }, createParticle);
            mouse = { x: -1000, y: -1000 };
        }

        function drawParticle(p) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${CONFIG.color.r}, ${CONFIG.color.g}, ${CONFIG.color.b}, ${p.opacity})`;
            ctx.fill();
        }

        function drawConnection(p1, p2, dist) {
            const opacity = (1 - dist / CONFIG.connectionDistance) * CONFIG.lineOpacity;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(${CONFIG.color.r}, ${CONFIG.color.g}, ${CONFIG.color.b}, ${opacity})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        function drawMouseConnection(p, dist) {
            const opacity = (1 - dist / CONFIG.mouseRadius) * 0.25;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = `rgba(${CONFIG.color.r}, ${CONFIG.color.g}, ${CONFIG.color.b}, ${opacity})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
        }

        function update() {
            for (const p of particles) {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;

                // Subtle mouse repulsion
                const dx = p.x - mouse.x;
                const dy = p.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < CONFIG.mouseRadius && dist > 0) {
                    const force = (CONFIG.mouseRadius - dist) / CONFIG.mouseRadius * 0.01;
                    p.vx += (dx / dist) * force;
                    p.vy += (dy / dist) * force;
                }

                // Dampen velocity
                const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                if (speed > CONFIG.particleSpeed * 2) {
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Background gradient
            const grad = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, Math.max(width, height) * 0.7);
            grad.addColorStop(0, '#0a0e1a');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            // Connections between particles
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONFIG.connectionDistance) {
                        drawConnection(particles[i], particles[j], dist);
                    }
                }
            }

            // Mouse connections and particles
            for (const p of particles) {
                const dx = p.x - mouse.x;
                const dy = p.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < CONFIG.mouseRadius) {
                    drawMouseConnection(p, dist);
                }
                drawParticle(p);
            }
        }

        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });
        // Touch support
        window.addEventListener('touchmove', e => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });
        window.addEventListener('touchend', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        init();
        animate();
    </script>
</body>
</html>
