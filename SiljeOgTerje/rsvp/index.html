<!DOCTYPE html>
<html lang="nb" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Silje &amp; Terje — Svar på invitasjonen 💌</title>
<link rel="icon" href="../images/icon-192.png" />
<style>
  :root {
    --gull: #8A6420; --gull-lys: #B8893C; --gull-bg: rgba(184,137,60,0.10);
    --krem: #FAF6EE; --kort: #FFFFFF; --tekst: #1A2C3F; --muted: #6B7A8C;
    --kant: rgba(184,137,60,0.30); --gronn: #4F8A5B; --gronn-bg: rgba(79,138,91,0.12);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { background: var(--krem); color: var(--tekst);
    font-family: 'Palatino Linotype', 'Book Antiqua', Georgia, serif; }
  body { max-width: 560px; margin: 0 auto; min-height: 100vh; padding: 0 16px 48px;
    padding-top: max(env(safe-area-inset-top, 0px), 16px); }
  input, textarea, select, button { font-family: inherit; }
  header { text-align: center; padding: 18px 0 8px; }
  .ringer { font-size: 34px; }
  header h1 { color: var(--gull); font-size: 24px; font-weight: 600; margin-top: 2px; letter-spacing: .5px; }
  header p { color: var(--muted); font-size: 15px; margin-top: 4px; }
  .kort { background: var(--kort); border: 1px solid var(--kant); border-radius: 16px;
    padding: 20px; margin-top: 16px; box-shadow: 0 4px 18px rgba(138,100,32,0.07); }
  .hilsen { text-align: center; font-size: 18px; color: var(--gull); margin-bottom: 6px; }
  .felt { margin: 18px 0; }
  .felt > label { display: block; font-size: 15px; font-weight: 600; margin-bottom: 8px; color: var(--tekst); }
  .felt .hint { font-weight: 400; color: var(--muted); font-size: 13px; }
  .valg { display: flex; gap: 10px; }
  .valg label { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px; border: 1.5px solid var(--kant); border-radius: 12px; cursor: pointer;
    background: var(--gull-bg); transition: all .15s; font-size: 15px; }
  .valg input { display: none; }
  .valg label.valgt-ja { border-color: var(--gronn); background: var(--gronn-bg); color: var(--gronn); font-weight: 600; }
  .valg label.valgt-nei { border-color: #C0708A; background: rgba(192,112,138,0.12); color: #A8506E; font-weight: 600; }
  input[type=number], textarea, select { width: 100%; padding: 11px 12px; border: 1.5px solid var(--kant);
    border-radius: 10px; background: #fff; color: var(--tekst); font-size: 15px; }
  textarea { min-height: 70px; resize: vertical; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--gull-lys); }
  .knapp { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
    cursor: pointer; background: linear-gradient(135deg, var(--gull-lys), var(--gull)); color: #fff;
    box-shadow: 0 3px 12px rgba(138,100,32,0.25); margin-top: 6px; }
  .knapp:disabled { opacity: .6; cursor: default; }
  .knapp.sekundar { background: #fff; color: var(--gull); border: 1.5px solid var(--kant); box-shadow: none; }
  .skjult { display: none !important; }
  .status { text-align: center; font-size: 14px; margin-top: 12px; min-height: 18px; }
  .status.ok { color: var(--gronn); }
  .status.feil { color: #C0405E; }
  .ferdig { text-align: center; padding: 14px 0; }
  .ferdig .stor { font-size: 44px; }
  .ferdig h2 { color: var(--gull); font-size: 22px; margin: 8px 0; }
  .ferdig p { color: var(--muted); font-size: 15px; }
  .oppsummering { background: var(--gull-bg); border-radius: 12px; padding: 14px; margin: 14px 0; text-align: left; font-size: 14px; }
  .oppsummering div { margin: 4px 0; }
  .til-app { display: block; text-align: center; margin-top: 18px; color: var(--gull-lys); font-size: 14px; }
</style>
</head>
<body>
<header>
  <div class="ringer">💍</div>
  <h1>Silje &amp; Terje</h1>
  <p>Lørdag 22. august 2026 · Tromsø</p>
</header>

<div class="kort" id="velg-kort">
  <div class="felt">
    <label for="velg-gjest">Hvem svarer? <span class="hint">Velg navnet ditt fra lista</span></label>
    <select id="velg-gjest"><option value="">— velg navn —</option></select>
  </div>
</div>

<form class="kort skjult" id="skjema">
  <div class="hilsen" id="hilsen"></div>

  <div class="felt">
    <label>Kommer du i bryllupet? 🥂</label>
    <div class="valg" id="valg-kommer">
      <label data-v="ja"><input type="radio" name="kommer" value="ja" /> ✓ Ja, jeg kommer</label>
      <label data-v="nei"><input type="radio" name="kommer" value="nei" /> ✗ Dessverre ikke</label>
    </div>
  </div>

  <div id="ja-felter" class="skjult">
    <div class="felt">
      <label>Kommer du på minglingen fredag? 🍕 <span class="hint">Uformell sammenkomst kvelden før (fredag 21. august)</span></label>
      <div class="valg" id="valg-fredag">
        <label data-v="ja"><input type="radio" name="fredag" value="ja" /> ✓ Ja</label>
        <label data-v="nei"><input type="radio" name="fredag" value="nei" /> ✗ Nei</label>
      </div>
    </div>

    <div class="felt">
      <label for="antall">Antall personer <span class="hint">Inkludert deg selv og evt. ledsager</span></label>
      <input type="number" id="antall" min="1" max="20" value="1" />
    </div>

    <div class="felt">
      <label for="allergier">Allergier / matpreferanser <span class="hint">(valgfritt)</span></label>
      <textarea id="allergier" placeholder="F.eks. glutenfri, vegetar, nøtteallergi …"></textarea>
    </div>
  </div>

  <div class="felt">
    <label for="kommentar">Hilsen til brudeparet <span class="hint">(valgfritt)</span></label>
    <textarea id="kommentar" placeholder="En liten hilsen …"></textarea>
  </div>

  <button type="submit" class="knapp" id="lagre-btn">Send svaret mitt</button>
  <div class="status" id="status"></div>
</form>

<div class="kort skjult ferdig" id="takk">
  <div class="stor" id="takk-emoji">💌</div>
  <h2 id="takk-tittel">Takk for svaret!</h2>
  <p id="takk-tekst"></p>
  <div class="oppsummering" id="takk-oppsummering"></div>
  <button class="knapp sekundar" id="endre-btn">Endre svaret mitt</button>
</div>

<a class="til-app" href="../">← Til bryllupsappen</a>

<script src="../data.js"></script>
<script src="rsvp.js"></script>
</body>
</html>
