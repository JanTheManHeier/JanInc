function getSnackExercisesForLocation(locationId) {
  return Object.entries(MICRO_EX)
    .filter(([_, ex]) => ex.location === locationId)
    .map(([id, ex]) => ({ id, ...ex }));
}

function getSnackExercisesForPurpose(purposeId) {
  return Object.entries(MICRO_EX)
    .filter(([_, ex]) => ex.purposes.includes(purposeId))
    .map(([id, ex]) => ({ id, ...ex }));
}

function generateSnackRoutine(pool, options) {
  options = options || {};
  // Filter out contra exercises (user has achilles + lower_back)
  let filtered = pool.filter(ex => {
    if (ex.contra && ex.contra.length) {
      for (const c of ex.contra) {
        if (c === 'achilles' || c === 'lower_back') return false;
      }
    }
    return true;
  });
  if (filtered.length === 0) filtered = pool;

  // Shuffle
  filtered = filtered.sort(() => Math.random() - 0.5);

  // Pick 3-5 exercises with diversity rules
  const picked = [];
  const patterns = new Set();
  let isometricStreak = 0;

  for (const ex of filtered) {
    if (picked.length >= 5) break;
    const isHold = ex.pattern === 'hold';
    if (isHold && isometricStreak >= 2) continue;
    picked.push(ex);
    patterns.add(ex.pattern);
    isometricStreak = isHold ? isometricStreak + 1 : 0;
  }

  // Ensure at least 3
  while (picked.length < 3 && filtered.length > picked.length) {
    const remaining = filtered.filter(e => !picked.includes(e));
    if (remaining.length) picked.push(remaining[0]);
    else break;
  }

  // Ensure at least 2 different movement patterns
  if (patterns.size < 2 && filtered.length > picked.length) {
    const remaining = filtered.filter(e => !picked.includes(e) && !patterns.has(e.pattern));
    if (remaining.length) {
      if (picked.length >= 5) picked.pop();
      picked.push(remaining[0]);
    }
  }

  // If purpose is stress or focus, end with breathing
  if (options.purpose === 'stress' || options.purpose === 'focus') {
    const hasBreathing = picked.some(e => e.pattern === 'breathing');
    if (!hasBreathing) {
      const breathers = filtered.filter(e => e.pattern === 'breathing' && !picked.includes(e));
      if (breathers.length) {
        if (picked.length >= 5) picked.pop();
        picked.push(breathers[0]);
      }
    }
    const bIdx = picked.findIndex(e => e.pattern === 'breathing');
    if (bIdx >= 0 && bIdx !== picked.length - 1) {
      const [b] = picked.splice(bIdx, 1);
      picked.push(b);
    }
  }

  return picked;
}

function openSnackByLocation(locationId) {
  const pool = getSnackExercisesForLocation(locationId);
  const routine = generateSnackRoutine(pool);
  startSnackSession(routine, 'loc', locationId);
}

function openSnackByPurpose(purposeId) {
  const pool = getSnackExercisesForPurpose(purposeId);
  // Prefer discreet locations
  const locOrder = { desk: 0, eyes: 1, meeting: 2, stairs: 3, pullup: 4, private: 5 };
  pool.sort((a, b) => (locOrder[a.location] || 9) - (locOrder[b.location] || 9));
  const routine = generateSnackRoutine(pool, { purpose: purposeId });
  startSnackSession(routine, 'pur', purposeId);
}

function openSnackSurprise() {
  const discreetLocs = ['desk', 'meeting', 'eyes'];
  const allLocs = ['desk', 'meeting', 'eyes', 'private', 'pullup', 'stairs'];
  const chosen = Math.random() < 0.7
    ? discreetLocs[Math.floor(Math.random() * discreetLocs.length)]
    : allLocs[Math.floor(Math.random() * allLocs.length)];
  openSnackByLocation(chosen);
}

function startSnackSession(routine, filterType, filterId) {
  const exercises = routine.map(ex => ({
    exId: ex.id,
    type: ex.type,
    target: ex.default,
    actual: 0,
    completed: false,
    skipped: false,
  }));

  state.snackSession = {
    id: uuid(),
    dateKey: new Date().toISOString().slice(0, 10),
    startedAt: Date.now(),
    completedAt: null,
    status: 'active',
    locationId: filterType === 'loc' ? filterId : routine[0]?.location || 'desk',
    purposeId: filterType === 'pur' ? filterId : null,
    routine: exercises,
    currentIndex: -1,
    totalSeconds: 0,
  };

  requestWakeLock();
  renderSnackOverlay();
}

function renderSnackOverlay() {
  const ss = state.snackSession;
  if (!ss) return;

  document.getElementById('snackOverlay')?.remove();

  const overlay = document.createElement('div');
  overlay.className = 'snack-overlay';
  overlay.id = 'snackOverlay';

  const filterLabel = ss.purposeId
    ? t('snack.pur.' + ss.purposeId)
    : t('snack.loc.' + ss.locationId);

  if (ss.status === 'completed' || ss.status === 'aborted') {
    const totalSec = Math.round((ss.completedAt - ss.startedAt) / 1000);
    const completed = ss.routine.filter(e => e.completed).length;
    overlay.innerHTML = '<div class="snack-overlay-header">'
      + '<div class="snack-overlay-title">\u26A1 ' + t('snack.title') + '</div>'
      + '</div>'
      + '<div class="snack-body">'
      + '<div class="snack-complete">'
      + '<div class="snack-complete-emoji">\u{1F389}</div>'
      + '<h2>' + t('snack.complete') + '</h2>'
      + '<div class="snack-complete-time">' + completed + '/' + ss.routine.length + ' \u00B7 ' + formatTime(totalSec) + '</div>'
      + '<button class="btn btn-primary btn-block" onclick="closeSnackOverlay()">' + t('snack.done') + '</button>'
      + '</div></div>';
    document.body.appendChild(overlay);
    return;
  }

  const isRunning = ss.currentIndex >= 0;
  let bodyHtml = '';

  for (let i = 0; i < ss.routine.length; i++) {
    const exEntry = ss.routine[i];
    const ex = MICRO_EX[exEntry.exId];
    const isActive = i === ss.currentIndex;
    const isDone = exEntry.completed;
    const isSkipped = exEntry.skipped;
    const cls = isActive ? 'active' : isDone ? 'done' : isSkipped ? 'skipped' : '';
    const sideStr = ex.perSide ? ' ' + t('common.per_side') : '';
    const targetStr = ex.type === 'time'
      ? exEntry.target + t('common.sec') + sideStr
      : exEntry.target + ' reps' + sideStr;
    const prefix = isDone ? '\u2713 ' : isSkipped ? '\u2014 ' : '';

    bodyHtml += '<div class="snack-ex-item ' + cls + '">'
      + '<span class="snack-ex-icon">' + ex.icon + '</span>'
      + '<div class="snack-ex-name">' + tName(ex.name) + '</div>'
      + '<div class="snack-ex-instr">' + tName(ex.instruction) + '</div>'
      + '<div class="snack-ex-target">' + prefix + targetStr + '</div>'
      + '</div>';
  }

  // Timer/counter for active exercise
  let activeHtml = '';
  if (isRunning && ss.currentIndex < ss.routine.length) {
    const exEntry = ss.routine[ss.currentIndex];
    const ex = MICRO_EX[exEntry.exId];
    if (ex.type === 'time') {
      if (ex.pattern === 'breathing') {
        // Breathing guide UI
        const remaining = state.snackTimer.running
          ? Math.max(0, Math.ceil((state.snackTimer.endsAt - Date.now()) / 1000))
          : exEntry.target;
        const phase = state.snackBreathPhase || { name: 'ready', sec: 0 };
        const phaseLabels = { inhale: t('breathe.in'), hold_in: t('breathe.hold'), exhale: t('breathe.out'), hold_out: t('breathe.hold'), ready: t('timer.ready') };
        const phaseClass = state.snackTimer.running ? (phase.name === 'inhale' ? 'inhale' : phase.name === 'hold_in' ? 'hold-in' : phase.name === 'exhale' ? 'exhale' : phase.name === 'hold_out' ? 'hold-out' : '') : '';
        activeHtml = '<div class="snack-breathe-wrap">'
          + '<div class="snack-breathe-ring">'
          + '<div class="snack-breathe-orb ' + phaseClass + '" id="snackBreatheOrb"></div>'
          + '</div>'
          + '<div class="snack-breathe-phase" id="snackBreathePhase">' + (phaseLabels[phase.name] || '') + '</div>'
          + '<div class="snack-breathe-count" id="snackBreatheCount">' + (state.snackTimer.running ? phase.sec : '') + '</div>'
          + '<div class="snack-breathe-total" id="snackBreatheTotal">' + remaining + t('common.sec') + ' ' + t('breathe.remaining') + '</div>'
          + '</div>'
          + '<div class="snack-actions">'
          + '<button class="btn btn-secondary btn-sm" onclick="snackSkipExercise()">' + t('snack.skip') + '</button>';
        if (!state.snackTimer.running) {
          activeHtml += '<button class="btn btn-primary" onclick="startSnackBreathing()" id="snackTimerBtn">\u25B6 ' + t('snack.start') + '</button>';
        } else {
          activeHtml += '<button class="btn btn-orange" onclick="stopSnackTimer(false)" id="snackTimerBtn">\u25A0 ' + t('timer.stop') + '</button>';
        }
        activeHtml += '<button class="btn btn-success btn-sm" onclick="snackCompleteExercise()">' + t('snack.done') + '</button>'
          + '</div>';
      } else {
      // Regular timer UI
      const circ = 2 * Math.PI * 62;
      const remaining = state.snackTimer.running
        ? Math.max(0, Math.ceil((state.snackTimer.endsAt - Date.now()) / 1000))
        : exEntry.target;
      activeHtml = '<div class="snack-timer-wrap">'
        + '<div class="snack-timer-ring" id="snackTimerRing">'
        + '<svg viewBox="0 0 140 140">'
        + '<circle class="bg" cx="70" cy="70" r="62"/>'
        + '<circle class="fg" id="snackTimerFg" cx="70" cy="70" r="62" stroke-dasharray="' + circ + '" stroke-dashoffset="0"/>'
        + '</svg>'
        + '<div class="snack-timer-center">'
        + '<span class="snack-timer-time" id="snackTimerDisplay">' + remaining + '</span>'
        + '<span class="snack-timer-state" id="snackTimerState">' + (state.snackTimer.running ? t('timer.hold') : t('timer.ready')) + '</span>'
        + '</div></div></div>'
        + '<div class="snack-actions">'
        + '<button class="btn btn-secondary btn-sm" onclick="snackSkipExercise()">' + t('snack.skip') + '</button>';
      if (!state.snackTimer.running) {
        activeHtml += '<button class="btn btn-primary" onclick="startSnackTimer()" id="snackTimerBtn">\u25B6 ' + t('snack.start') + '</button>';
      } else {
        activeHtml += '<button class="btn btn-orange" onclick="stopSnackTimer(false)" id="snackTimerBtn">\u25A0 ' + t('timer.stop') + '</button>';
      }
      activeHtml += '<button class="btn btn-success btn-sm" onclick="snackCompleteExercise()">' + t('snack.done') + '</button>'
        + '</div>';
      }  // end breathing/regular timer
    } else {
      const sideStr = ex.perSide ? ' ' + t('common.per_side') : '';
      const remaining = typeof state.snackRepCount === 'number' ? state.snackRepCount : exEntry.target;
      const isDone = remaining <= 0;
      activeHtml = '<div style="display:flex;flex-direction:column;align-items:center;margin:16px 0">'
        + '<div class="snack-rep-tap' + (isDone ? ' snack-rep-done' : '') + '" onclick="snackTapRep()" id="snackRepBtn">'
        + '<div class="rep-count">' + (isDone ? '✓' : remaining) + '</div>'
        + '<div class="rep-label">' + (isDone ? t('snack.reps_done') : t('snack.tap_reps')) + '</div>'
        + '</div>'
        + (sideStr ? '<div style="font-size:13px;color:var(--text2);margin-top:4px">' + sideStr + '</div>' : '')
        + '</div>'
        + '<div class="snack-actions">'
        + '<button class="btn btn-secondary btn-sm" onclick="snackSkipExercise()">' + t('snack.skip') + '</button>'
        + (isDone ? '<button class="btn btn-success" onclick="snackCompleteExercise()">\u2713 ' + t('snack.done') + '</button>'
                  : '<button class="btn btn-success btn-sm" onclick="snackCompleteExercise()">' + t('snack.done') + '</button>')
        + '</div>';
    }
  }

  // Start button if not started
  let startBtn = '';
  if (!isRunning) {
    startBtn = '<div class="snack-actions"><button class="btn btn-primary btn-block" onclick="snackAdvance()">\u25B6 ' + t('snack.start') + '</button></div>';
  }

  const progress = isRunning ? (ss.currentIndex + 1) + ' ' + t('snack.exercise_of') + ' ' + ss.routine.length : '';
  const progressSpan = progress ? ' <span style="font-size:13px;color:var(--text2);margin-left:8px">' + progress + '</span>' : '';

  overlay.innerHTML = '<div class="snack-overlay-header">'
    + '<div class="snack-overlay-title">\u26A1 ' + filterLabel + progressSpan + '</div>'
    + '<button class="btn btn-secondary btn-sm" onclick="abortSnackSession()">' + t('snack.abort') + '</button>'
    + '</div>'
    + '<div class="snack-body">' + bodyHtml + activeHtml + startBtn + '</div>';
  document.body.appendChild(overlay);

  // Scroll active into view
  if (isRunning) {
    setTimeout(function() {
      const activeEl = overlay.querySelector('.snack-ex-item.active');
      if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
}

function snackAdvance() {
  const ss = state.snackSession;
  if (!ss) return;

  let next = ss.currentIndex + 1;
  while (next < ss.routine.length && (ss.routine[next].completed || ss.routine[next].skipped)) {
    next++;
  }

  if (next >= ss.routine.length) {
    finishSnackSession('completed');
    return;
  }

  ss.currentIndex = next;
  state.snackTimer = { endsAt: null, duration: 0, startedAt: null, running: false };
  state.snackRepCount = ss.routine[next] ? ss.routine[next].target : 0;
  state.snackBreathPhase = null;
  state.snackBreathInterval = null;
  renderSnackOverlay();
}

function snackCompleteExercise() {
  const ss = state.snackSession;
  if (!ss || ss.currentIndex < 0) return;

  state.snackTimer.running = false;
  if (state.snackBreathInterval) { clearInterval(state.snackBreathInterval); state.snackBreathInterval = null; }
  const exEntry = ss.routine[ss.currentIndex];
  const ex = MICRO_EX[exEntry.exId];
  exEntry.completed = true;

  if (ex.type === 'time' && state.snackTimer.startedAt) {
    exEntry.actual = Math.round((Date.now() - state.snackTimer.startedAt) / 1000);
  } else if (ex.type === 'reps' && typeof state.snackRepCount === 'number') {
    exEntry.actual = exEntry.target - state.snackRepCount;
  } else {
    exEntry.actual = exEntry.target;
  }

  vibrate(50);
  renderSnackOverlay();
  setTimeout(function() { snackAdvance(); }, 800);
}

function snackSkipExercise() {
  const ss = state.snackSession;
  if (!ss || ss.currentIndex < 0) return;

  state.snackTimer.running = false;
  if (state.snackBreathInterval) { clearInterval(state.snackBreathInterval); state.snackBreathInterval = null; }
  ss.routine[ss.currentIndex].skipped = true;
  ss.routine[ss.currentIndex].actual = 0;

  renderSnackOverlay();
  setTimeout(function() { snackAdvance(); }, 300);
}

function startSnackTimer() {
  const ss = state.snackSession;
  if (!ss || ss.currentIndex < 0) return;
  const exEntry = ss.routine[ss.currentIndex];
  const dur = exEntry.target;
  if (dur <= 0) return;

  state.snackTimer = { endsAt: Date.now() + dur * 1000, duration: dur, startedAt: Date.now(), running: true };
  renderSnackOverlay();
  requestAnimationFrame(tickSnackTimer);
}

function stopSnackTimer(completed) {
  const st = state.snackTimer;
  state.snackTimer = { endsAt: null, duration: 0, startedAt: null, running: false };

  if (completed) {
    vibrate([100, 50, 100]);
    snackCompleteExercise();
  } else {
    renderSnackOverlay();
  }
}

function tickSnackTimer() {
  const st = state.snackTimer;
  if (!st.running) return;

  const remaining = Math.max(0, Math.ceil((st.endsAt - Date.now()) / 1000));
  const disp = $('snackTimerDisplay');
  const ring = $('snackTimerFg');
  const stateEl = $('snackTimerState');

  if (disp) disp.textContent = remaining;
  if (stateEl) stateEl.textContent = t('timer.hold');
  if (ring) {
    const circ = 2 * Math.PI * 62;
    const progress = 1 - remaining / st.duration;
    ring.setAttribute('stroke-dashoffset', circ * progress);
  }

  if (remaining <= 0) {
    stopSnackTimer(true);
    return;
  }
  requestAnimationFrame(tickSnackTimer);
}

// --- Rep tap counter ---
function snackTapRep() {
  if (typeof state.snackRepCount !== 'number' || state.snackRepCount <= 0) return;
  state.snackRepCount--;
  vibrate(15);

  const btn = document.getElementById('snackRepBtn');
  if (btn) {
    const countEl = btn.querySelector('.rep-count');
    const labelEl = btn.querySelector('.rep-label');
    if (state.snackRepCount <= 0) {
      if (countEl) countEl.textContent = '✓';
      if (labelEl) labelEl.textContent = t('snack.reps_done');
      btn.classList.add('snack-rep-done');
      vibrate([50, 30, 50]);
      // Auto-complete after brief flash
      setTimeout(function() { snackCompleteExercise(); }, 600);
    } else {
      if (countEl) countEl.textContent = state.snackRepCount;
      btn.style.transform = 'scale(.88)';
      setTimeout(function() { btn.style.transform = ''; }, 100);
    }
  }
}

// --- Breathing guide ---
function startSnackBreathing() {
  const ss = state.snackSession;
  if (!ss || ss.currentIndex < 0) return;
  const exEntry = ss.routine[ss.currentIndex];
  const dur = exEntry.target;

  state.snackTimer = { endsAt: Date.now() + dur * 1000, duration: dur, startedAt: Date.now(), running: true };

  // Box breathing: 4s in, 4s hold, 4s out, 4s hold = 16s cycle
  const phases = [
    { name: 'inhale', duration: 4 },
    { name: 'hold_in', duration: 4 },
    { name: 'exhale', duration: 4 },
    { name: 'hold_out', duration: 4 },
  ];
  let phaseIdx = 0;
  let phaseSec = phases[0].duration;
  state.snackBreathPhase = { name: phases[0].name, sec: phaseSec };

  renderSnackOverlay();

  state.snackBreathInterval = setInterval(function() {
    if (!state.snackTimer.running) {
      clearInterval(state.snackBreathInterval);
      state.snackBreathInterval = null;
      return;
    }

    const totalRemaining = Math.max(0, Math.ceil((state.snackTimer.endsAt - Date.now()) / 1000));
    if (totalRemaining <= 0) {
      clearInterval(state.snackBreathInterval);
      state.snackBreathInterval = null;
      stopSnackTimer(true);
      return;
    }

    phaseSec--;
    if (phaseSec <= 0) {
      phaseIdx = (phaseIdx + 1) % phases.length;
      phaseSec = phases[phaseIdx].duration;
    }
    state.snackBreathPhase = { name: phases[phaseIdx].name, sec: phaseSec };

    // Update DOM directly for smooth UX (avoid full re-render)
    const phaseLabels = { inhale: t('breathe.in'), hold_in: t('breathe.hold'), exhale: t('breathe.out'), hold_out: t('breathe.hold') };
    const phaseEl = document.getElementById('snackBreathePhase');
    const countEl = document.getElementById('snackBreatheCount');
    const totalEl = document.getElementById('snackBreatheTotal');
    const orbEl = document.getElementById('snackBreatheOrb');
    if (phaseEl) phaseEl.textContent = phaseLabels[phases[phaseIdx].name] || '';
    if (countEl) countEl.textContent = phaseSec;
    if (totalEl) totalEl.textContent = totalRemaining + t('common.sec') + ' ' + t('breathe.remaining');
    if (orbEl) {
      orbEl.className = 'snack-breathe-orb';
      const cls = phases[phaseIdx].name === 'inhale' ? 'inhale' : phases[phaseIdx].name === 'hold_in' ? 'hold-in' : phases[phaseIdx].name === 'exhale' ? 'exhale' : 'hold-out';
      // Force reflow so transition re-triggers
      void orbEl.offsetWidth;
      orbEl.classList.add(cls);
    }
  }, 1000);
}

function finishSnackSession(status) {
  const ss = state.snackSession;
  if (!ss) return;

  state.snackTimer = { endsAt: null, duration: 0, startedAt: null, running: false };
  if (state.snackBreathInterval) { clearInterval(state.snackBreathInterval); state.snackBreathInterval = null; }
  ss.completedAt = Date.now();
  ss.status = status;
  ss.totalSeconds = Math.round((ss.completedAt - ss.startedAt) / 1000);

  Store.saveSnack({
    id: ss.id,
    dateKey: ss.dateKey,
    startedAt: ss.startedAt,
    completedAt: ss.completedAt,
    status: ss.status,
    locationId: ss.locationId,
    purposeId: ss.purposeId,
    routine: ss.routine.map(function(r) {
      return { exId: r.exId, type: r.type, target: r.target, actual: r.actual, completed: r.completed };
    }),
    totalSeconds: ss.totalSeconds,
  });

  vibrate([100, 50, 100, 50, 200]);
  renderSnackOverlay();
}

function abortSnackSession() {
  const ss = state.snackSession;
  if (!ss) return;

  if (ss.routine.some(function(e) { return e.completed; })) {
    finishSnackSession('aborted');
  } else {
    state.snackSession = null;
    state.snackTimer = { endsAt: null, duration: 0, startedAt: null, running: false };
    if (state.snackBreathInterval) { clearInterval(state.snackBreathInterval); state.snackBreathInterval = null; }
    document.getElementById('snackOverlay')?.remove();
    releaseWakeLock();
  }
}

function closeSnackOverlay() {
  state.snackSession = null;
  document.getElementById('snackOverlay')?.remove();
  releaseWakeLock();
  renderContent();
}

function renderSnackProgress() {
  const snacks = Store.getSnacks().filter(function(s) { return s.status === 'completed'; });
  if (snacks.length === 0) return '';

  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay() + 1);
  weekStart.setHours(0, 0, 0, 0);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  const thisWeek = snacks.filter(function(s) { return new Date(s.startedAt) >= weekStart; }).length;
  const thisMonth = snacks.filter(function(s) { return new Date(s.startedAt) >= monthStart; }).length;

  // Favorite location
  const locCounts = {};
  for (const s of snacks) {
    locCounts[s.locationId] = (locCounts[s.locationId] || 0) + 1;
  }
  const favEntries = Object.entries(locCounts).sort(function(a, b) { return b[1] - a[1]; });
  const favLocLabel = favEntries.length ? t('snack.loc.' + favEntries[0][0]) : t('snack.none_yet');

  let html = '<div class="snack-progress-section">';
  html += '<div class="snack-progress-title">\u26A1 ' + t('snack.progress_title') + '</div>';
  html += '<div class="snack-progress-grid">';
  html += '<div class="snack-progress-stat"><div class="val">' + thisWeek + '</div><div class="lbl">' + t('snack.weekly') + '</div></div>';
  html += '<div class="snack-progress-stat"><div class="val">' + thisMonth + '</div><div class="lbl">' + t('snack.monthly') + '</div></div>';
  html += '<div class="snack-progress-stat"><div class="val" style="font-size:14px">' + favLocLabel + '</div><div class="lbl">' + t('snack.fav_loc') + '</div></div>';
  html += '</div></div>';
  return html;
}

// ==================== SATS APP LINK ====================
function openSatsApp() {
  const fallback = 'https://apps.apple.com/no/app/sats/id1272653109';
  const timer = setTimeout(() => { window.location = fallback; }, 1500);
  window.addEventListener('blur', () => clearTimeout(timer), { once: true });
  window.location = 'sats://';
}

// ==================== INIT ====================
function init() {
  // Load settings
  state.settings = Store.getSettings();
  state.lang = state.settings.lang || 'no';
  state.lastSync = Store.get('sync_ts', null);

  applyTheme();
  renderAll();

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // Background sync on load
  setTimeout(() => syncToServer(), 2000);

  // Sync on visibility change
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      syncToServer();
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
